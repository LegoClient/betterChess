name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Pin the Momentum SDK release here so CI and local builds line up.
env:
  MOMENTUM_SDK_URL: https://github.com/Next-Flip/Momentum-Firmware/releases/download/mntm-011/flipper-z-f7-sdk-mntm-011.zip

jobs:
  build:
    name: Build (Momentum mntm-011)
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed by softprops/action-gh-release on tag pushes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ufbt
        run: pip install --upgrade ufbt

      - name: Pin ufbt to Momentum mntm-011 SDK
        run: ufbt update --hw-target=f7 --url=${{ env.MOMENTUM_SDK_URL }}

      - name: Build betterchess.fap
        run: ufbt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: betterchess-fap
          path: dist/betterchess.fap
          if-no-files-found: error

      - name: Attach .fap to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/betterchess.fap
          fail_on_unmatched_files: true
